# Cloudflare Workers config for the Astro SSR storefront.
# Built by @astrojs/cloudflare. The adapter exposes a unified entrypoint that
# handles both `astro dev` and production — point `main` at it (NOT the built
# ./dist/_worker.js path, which doesn't exist before the build).
name = "edition"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2024-11-01"
# Astro + deps use Node built-ins (crypto, etc.) — required on Workers.
compatibility_flags = ["nodejs_compat"]

# Serve prerendered/static assets from the build, falling back to the worker.
[assets]
binding = "ASSETS"
directory = "./dist"

# Non-secret vars can live here. SECRETS (token, client id, shop id, domain,
# Resend key) must NOT be committed — set them with `wrangler secret put <NAME>`
# or in the Cloudflare dashboard (Workers → Settings → Variables and Secrets).
[vars]
SHOPIFY_API_VERSION = "2026-04"
CUSTOMER_ACCOUNT_API_VERSION = "2025-01"
